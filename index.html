<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>《不知神之来兮》· 世界观与剧本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#06141c;--bg2:#0a2029;--ink:#d9e7ea;--dim:#8aa6ad;--red:#d6434d;--teal:#3aa0a4;--line:#1d3b44}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(120% 90% at 50% -10%,#0d2a33 0%,var(--bg) 60%);color:var(--ink);font-family:"Noto Serif SC","Songti SC",serif;line-height:1.85}
a{color:var(--teal);text-decoration:none}
.hero{padding:64px 24px 40px;text-align:center;border-bottom:1px solid var(--line)}
.hero h1{font-size:clamp(34px,6vw,64px);font-weight:900;margin:0;letter-spacing:.12em;color:#f0f5f6;text-shadow:0 0 24px rgba(58,160,164,.35)}
.hero p{color:var(--dim);margin:14px 0 0;font-size:16px;letter-spacing:.1em}
.hero .blood{color:var(--red)}
.layout{display:flex;max-width:1180px;margin:0 auto;gap:32px;padding:0 20px}
.sidebar{width:250px;flex:0 0 250px;position:sticky;top:0;align-self:flex-start;height:100vh;overflow:auto;padding:28px 8px 60px;border-right:1px solid var(--line)}
.sidebar .label{color:var(--red);font-weight:600;letter-spacing:.2em;font-size:13px;margin:0 0 14px 10px}
#toc{display:flex;flex-direction:column}
#toc a{padding:6px 12px;color:var(--dim);border-left:2px solid transparent;font-size:14px;transition:.2s}
#toc a:hover{color:var(--ink)}
#toc a.h1{color:#cfe2e6;font-weight:600;margin-top:14px}
#toc a.h2{padding-left:24px;font-size:13px}
#toc a.active{color:var(--red);border-left-color:var(--red);background:rgba(214,67,77,.08)}
.content{flex:1;min-width:0;padding:36px 0 120px}
.content h1{font-size:30px;color:#f0f5f6;border-bottom:2px solid var(--red);padding-bottom:12px;margin:56px 0 24px;letter-spacing:.05em}
.content h2{font-size:23px;color:var(--teal);border-left:4px solid var(--teal);padding-left:14px;margin:44px 0 18px}
.content h3{font-size:18px;color:#e7c4c7;margin:30px 0 12px}
.content p{margin:14px 0;color:#c8d8db}
.content strong{color:#fff}
.content em{color:var(--red);font-style:normal}
.content blockquote{margin:18px 0;padding:14px 20px;border-left:3px solid var(--red);background:rgba(214,67,77,.06);border-radius:0 8px 8px 0;color:#e6d2d4}
.content blockquote p{margin:6px 0;color:#e6d2d4}
.content pre{background:#081a22;border:1px solid var(--line);border-radius:10px;padding:18px 20px;overflow:auto;box-shadow:inset 0 0 30px rgba(0,0,0,.4)}
.content pre code{font-family:"Noto Serif SC",monospace;color:#bfe0df;font-size:15px;line-height:2}
.content code{background:#0f2730;padding:2px 6px;border-radius:4px;color:#9fd6d4}
.content table{border-collapse:collapse;width:100%;margin:20px 0;font-size:14px}
.content th,.content td{border:1px solid var(--line);padding:10px 12px;text-align:left}
.content th{background:rgba(58,160,164,.14);color:#dff0f1}
.content tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.content hr{border:0;border-top:1px solid var(--line);margin:40px 0}
.loading{color:var(--dim);text-align:center;padding:80px 0}
.section-tag{display:inline-block;margin:60px 0 0;padding:6px 16px;border:1px solid var(--red);border-radius:20px;color:var(--red);font-size:13px;letter-spacing:.2em}
@media(max-width:820px){.sidebar{display:none}.layout{padding:0 16px}}
</style>
</head>
<body>
<header class="hero">
  <h1>不知神之来兮</h1>
  <p>互动影游 · 世界观设定 &nbsp;|&nbsp; <span class="blood">第一集剧本</span> &nbsp;|&nbsp; 人物与场景</p>
</header>
<div class="layout">
  <aside class="sidebar">
    <p class="label">目 录 INDEX</p>
    <nav id="toc"></nav>
  </aside>
  <main class="content">
    <div id="bible"><p class="loading">正在载入设定圣经……</p></div>
    <div id="ep"></div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
async function load(){
  try{
    const [b,e]=await Promise.all([
      fetch('bible.md').then(r=>r.text()),
      fetch('episode1.md').then(r=>r.text())
    ]);
    document.getElementById('bible').innerHTML=marked.parse(b);
    document.getElementById('ep').innerHTML=marked.parse(e);
    buildTOC();
  }catch(err){
    document.getElementById('bible').innerHTML='<p class="loading">载入失败：请通过 GitHub Pages 链接访问（本地直接打开因浏览器安全限制无法读取 md）。</p>';
  }
}
function buildTOC(){
  const toc=document.getElementById('toc');
  const heads=document.querySelectorAll('.content h1, .content h2');
  heads.forEach((h,i)=>{
    const id='sec'+i; h.id=id;
    const a=document.createElement('a');
    a.href='#'+id; a.textContent=h.textContent;
    a.className=h.tagName.toLowerCase();
    a.onclick=ev=>{ev.preventDefault();h.scrollIntoView({behavior:'smooth'});};
    toc.appendChild(a);
  });
  const obs=new IntersectionObserver(es=>{
    es.forEach(en=>{if(en.isIntersecting){
      toc.querySelectorAll('a').forEach(l=>l.classList.remove('active'));
      const act=toc.querySelector('a[href="#'+en.target.id+'"]');
      if(act)act.classList.add('active');
    }});
  },{rootMargin:'0px 0px -82% 0px'});
  heads.forEach(h=>obs.observe(h));
}
load();
</script>
</body>
</html>
